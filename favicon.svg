<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="QGIS for Windows favicon">
  <title>QGIS for Windows</title>
  <defs>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <!-- Green base -->
  <circle cx="32" cy="32" r="30" fill="#589632" />
  <!-- White Q ring -->
  <circle cx="32" cy="32" r="14" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" />
  <!-- Q tail -->
  <path d="M41 41 L50 50" stroke="#ffffff" stroke-width="6" stroke-linecap="round" />
  <!-- Accent pin dot -->
  <circle cx="48" cy="16" r="5" fill="#F0A202" filter="url(#s)" />
</svg>
